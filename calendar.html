<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>ตรวจสอบคิว — KMO RACK BAR CUSTOM</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&family=Sarabun:wght@300;400;600&display=swap" rel="stylesheet"/>
  <style>
    :root {
      --bg:        #111111;
      --surface:   #1a1a1a;
      --surface2:  #222222;
      --accent:    #e8b84b;
      --accent2:   #c9972d;
      --accent-glow: rgba(232, 184, 75, 0.3);
      --text:      #f0f0f0;
      --text-muted:#888;
      --green:     #2ecc71;
      --yellow:    #f39c12;
      --red:       #e74c3c;
      --closed:    #333;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Sarabun', sans-serif;
      min-height: 100vh;
    }

    /* Header - Enhanced with welding spark effect */
    .header {
      background: linear-gradient(135deg, #1a1a1a 0%, #222 100%);
      border-bottom: 2px solid var(--accent);
      padding: 24px 16px;
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .header::before {
      content: '';
      position: absolute;
      top: 0;
      left: -100%;
      width: 50%;
      height: 100%;
      background: linear-gradient(90deg, transparent, rgba(232, 184, 75, 0.1), transparent);
      animation: shimmer 3s ease-in-out infinite;
    }
    @keyframes shimmer {
      0%, 100% { left: -100%; }
      50% { left: 100%; }
    }
    .header-logo {
      font-family: 'Kanit', sans-serif;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 4px;
      color: var(--accent);
      text-transform: uppercase;
      margin-bottom: 6px;
      text-shadow: 0 0 10px var(--accent-glow);
    }
    .header-title {
      font-family: 'Kanit', sans-serif;
      font-size: 24px;
      font-weight: 700;
      color: var(--text);
    }
    .header-sub {
      font-size: 13px;
      color: var(--text-muted);
      margin-top: 6px;
    }

    /* Container */
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 16px;
    }

    /* Calendar Nav - Enhanced */
    .cal-nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin: 20px 0 16px;
    }
    .cal-nav button {
      background: var(--surface2);
      border: 1px solid #333;
      color: var(--text);
      width: 48px;
      height: 48px;
      border-radius: 12px;
      font-size: 20px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .cal-nav button:hover:not(:disabled) { 
      background: var(--accent); 
      color: #000;
      transform: scale(1.05);
      box-shadow: 0 4px 20px var(--accent-glow);
    }
    .cal-nav button:active:not(:disabled) {
      transform: scale(0.95);
    }
    .cal-nav button:disabled {
      opacity: 0.3;
      cursor: not-allowed;
    }
    .cal-month {
      font-family: 'Kanit', sans-serif;
      font-size: 18px;
      font-weight: 600;
      color: var(--accent);
      transition: opacity 0.3s ease;
    }

    /* Calendar Grid - Enhanced */
    .cal-grid {
      background: var(--surface);
      border-radius: 20px;
      overflow: hidden;
      border: 1px solid #2a2a2a;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.3);
    }

    .cal-weekdays {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      background: linear-gradient(180deg, var(--surface2) 0%, #1d1d1d 100%);
      border-bottom: 1px solid #2a2a2a;
    }
    .cal-weekday {
      text-align: center;
      padding: 12px 4px;
      font-family: 'Kanit', sans-serif;
      font-size: 12px;
      font-weight: 600;
      color: var(--text-muted);
    }
    .cal-weekday.sun { color: #e74c3c88; }
    .cal-weekday.tue { color: #e74c3c88; }

    .cal-days {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 1px;
      background: #2a2a2a;
      transition: opacity 0.3s ease, transform 0.3s ease;
    }
    .cal-days.fade-out {
      opacity: 0;
      transform: scale(0.98);
    }
    .cal-days.fade-in {
      opacity: 1;
      transform: scale(1);
    }

    .cal-day {
      background: var(--surface);
      min-height: 76px;
      padding: 8px 4px;
      display: flex;
      flex-direction: column;
      align-items: center;
      cursor: pointer;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      position: relative;
    }
    .cal-day:hover:not(.disabled):not(.empty):not(.past) {
      background: #282828;
      transform: scale(1.02);
      z-index: 10;
    }
    .cal-day.clickable:hover {
      box-shadow: inset 0 0 0 2px var(--accent-glow);
    }
    .cal-day.empty {
      background: var(--bg);
      cursor: default;
    }
    .cal-day.disabled {
      cursor: not-allowed;
    }
    
    /* Today highlight - Glow effect */
    .cal-day.today {
      background: linear-gradient(135deg, #1a1810 0%, #1e1a12 100%);
    }
    .cal-day.today::before {
      content: '';
      position: absolute;
      inset: 2px;
      border: 2px solid var(--accent);
      border-radius: 12px;
      opacity: 0.5;
      animation: pulse-border 2s ease-in-out infinite;
    }
    @keyframes pulse-border {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }
    .cal-day.today .day-num {
      background: var(--accent);
      color: #000;
      border-radius: 50%;
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      box-shadow: 0 2px 10px var(--accent-glow);
    }
    .cal-day.past {
      opacity: 0.35;
      cursor: not-allowed;
    }

    .day-num {
      font-family: 'Kanit', sans-serif;
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      width: 28px;
      height: 28px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 4px;
      border-radius: 50%;
      transition: all 0.2s ease;
    }

    .day-status {
      font-size: 10px;
      font-family: 'Sarabun', sans-serif;
      text-align: center;
      line-height: 1.3;
      font-weight: 600;
    }

    /* Status colors - Enhanced */
    .status-open   .day-status { color: var(--green); }
    .status-low    .day-status { color: var(--yellow); }
    .status-full   .day-status { color: var(--red); }

    .status-full   { background: #2a1515 !important; }
    .status-open:hover:not(.past) .day-num { background: rgba(46, 204, 113, 0.15); }
    .status-low:hover:not(.past) .day-num { background: rgba(243, 156, 18, 0.15); }

    /* Dot indicator - Enhanced with glow */
    .day-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      margin-top: 4px;
      transition: transform 0.2s ease;
    }
    .cal-day:hover:not(.disabled):not(.past) .day-dot {
      transform: scale(1.3);
    }
    .status-open   .day-dot { background: var(--green); box-shadow: 0 0 6px var(--green); }
    .status-low    .day-dot { background: var(--yellow); box-shadow: 0 0 6px var(--yellow); }
    .status-full   .day-dot { background: var(--red); box-shadow: 0 0 6px var(--red); }

    /* Legend - Enhanced */
    .legend {
      display: flex;
      gap: 16px;
      justify-content: center;
      margin: 20px 0;
      flex-wrap: wrap;
    }
    .legend-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: var(--text-muted);
      padding: 8px 12px;
      background: var(--surface);
      border-radius: 20px;
      border: 1px solid #2a2a2a;
    }
    .legend-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
    }

    /* Loading - Enhanced */
    .loading {
      text-align: center;
      padding: 50px 20px;
      color: var(--text-muted);
      font-size: 14px;
    }
    .spinner {
      width: 40px;
      height: 40px;
      border: 3px solid #333;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* Info box - Enhanced */
    .info-box {
      background: linear-gradient(135deg, var(--surface) 0%, #1d1d1d 100%);
      border: 1px solid #2a2a2a;
      border-radius: 16px;
      padding: 18px 20px;
      margin-top: 20px;
      font-size: 13px;
      color: var(--text-muted);
      line-height: 1.8;
    }
    .info-box strong { color: var(--accent); }
    .info-item {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 8px;
    }
    .info-item:last-child { margin-bottom: 0; }
    .info-icon {
      font-size: 16px;
      width: 24px;
      text-align: center;
    }

    /* Book button - Enhanced */
    .btn-book {
      display: block;
      width: 100%;
      padding: 18px;
      background: linear-gradient(135deg, var(--accent) 0%, var(--accent2) 100%);
      color: #000;
      font-family: 'Kanit', sans-serif;
      font-size: 17px;
      font-weight: 700;
      text-align: center;
      border-radius: 14px;
      text-decoration: none;
      margin-top: 20px;
      transition: all 0.25s cubic-bezier(0.4, 0, 0.2, 1);
      box-shadow: 0 4px 20px rgba(232, 184, 75, 0.2);
    }
    .btn-book:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 30px rgba(232, 184, 75, 0.35);
    }
    .btn-book:active {
      transform: translateY(0);
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 24px 16px;
      color: var(--text-muted);
      font-size: 11px;
    }
    .footer a {
      color: var(--accent);
      text-decoration: none;
    }

    /* Mobile touch optimization */
    @media (max-width: 480px) {
      .cal-day {
        min-height: 70px;
        -webkit-tap-highlight-color: transparent;
      }
      .cal-day.clickable:active {
        background: #2a2a2a;
        transform: scale(0.97);
      }
      .cal-nav button {
        width: 52px;
        height: 52px;
      }
    }
  </style>
</head>
<body>

<div class="header">
  <div class="header-logo">KMO RACK BAR CUSTOM</div>
  <div class="header-title">📅 ตรวจสอบคิวว่าง</div>
  <div class="header-sub">ดูวันที่ว่างและจำนวนคิวที่เหลือ</div>
</div>

<div class="container">

  <!-- Legend -->
  <div class="legend">
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--green); box-shadow: 0 0 6px var(--green);"></div>
      <span>ว่าง 3 คิว</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--yellow); box-shadow: 0 0 6px var(--yellow);"></div>
      <span>ว่าง 1-2 คิว</span>
    </div>
    <div class="legend-item">
      <div class="legend-dot" style="background:var(--red); box-shadow: 0 0 6px var(--red);"></div>
      <span>ปิดรับคิว</span>
    </div>
  </div>

  <!-- Calendar Nav -->
  <div class="cal-nav">
    <button id="btn-prev" onclick="changeMonth(-1)" aria-label="เดือนก่อนหน้า">‹</button>
    <div class="cal-month" id="cal-month-label">—</div>
    <button id="btn-next" onclick="changeMonth(1)" aria-label="เดือนถัดไป">›</button>
  </div>

  <!-- Calendar -->
  <div class="cal-grid">
    <div class="cal-weekdays">
      <div class="cal-weekday sun">อา</div>
      <div class="cal-weekday">จ</div>
      <div class="cal-weekday tue">อ</div>
      <div class="cal-weekday">พ</div>
      <div class="cal-weekday">พฤ</div>
      <div class="cal-weekday">ศ</div>
      <div class="cal-weekday">ส</div>
    </div>
    <div class="cal-days" id="cal-days">
      <div class="loading">
        <div class="spinner"></div>
        กำลังโหลดข้อมูลคิว...
      </div>
    </div>
  </div>

  <!-- Info -->
  <div class="info-box">
    <div class="info-item">
      <span class="info-icon">🏍️</span>
      <span>รับงานสูงสุด <strong>3 คิวต่อวัน</strong></span>
    </div>
    <div class="info-item">
      <span class="info-icon">📅</span>
      <span>ร้านปิดทุก<strong>วันอังคาร</strong></span>
    </div>
    <div class="info-item">
      <span class="info-icon">⏰</span>
      <span>หลังจองกรุณาชำระมัดจำ <strong>500 บาท</strong> ภายใน 24 ชม.</span>
    </div>
  </div>

  <!-- Book Button -->
  <a href="booking.html" class="btn-book">
    📋 กดจองคิวที่นี่
  </a>

</div>

<div class="footer">
  <a href="https://lin.ee/nqKigax" target="_blank">LINE: @hzf3231v</a> • 062-5893189
</div>

<script>
  // ===== ตั้งค่า =====
  const SUPABASE_URL = 'https://xfhpwxjywqgqefbncumm.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InhmaHB3eGp5d3FncWVmYm5jdW1tIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzI4MjIxMTQsImV4cCI6MjA4ODM5ODExNH0.GRfJ8aY9FgfMw18Vld4m2R6mE2cOwUsJw3OXOJEt0is';
  const MAX_PER_DAY = 3;
  // ===================

  let currentYear  = new Date().getFullYear();
  let currentMonth = new Date().getMonth();
  let bookingData  = {};
  let holidays     = new Set(); // เก็บวันหยุดจาก Supabase
  let isLoading    = false;

  const THAI_MONTHS = [
    'มกราคม','กุมภาพันธ์','มีนาคม','เมษายน','พฤษภาคม','มิถุนายน',
    'กรกฎาคม','สิงหาคม','กันยายน','ตุลาคม','พฤศจิกายน','ธันวาคม'
  ];

  // ===== โหลด holidays จาก Supabase =====
  async function loadHolidays() {
    try {
      const res = await fetch(`${SUPABASE_URL}/rest/v1/holidays?select=date`, {
        headers: {
          'apikey': SUPABASE_ANON_KEY,
          'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
        }
      });
      const data = await res.json();
      holidays = new Set(data.map(h => h.date));
    } catch (err) {
      console.error('โหลด holidays ไม่ได้:', err);
      holidays = new Set();
    }
  }

  // ===== โหลด bookings จาก Supabase =====
  async function loadBookings() {
    if (isLoading) return;
    isLoading = true;

    try {
      // ดึง bookings ของเดือนนี้
      const firstDay = `${currentYear}-${String(currentMonth + 1).padStart(2,'0')}-01`;
      const lastDay  = new Date(currentYear, currentMonth + 1, 0);
      const lastDayStr = toDateStr(lastDay);

      // นับ "คิวรับรถเข้าใหม่" ต่อวัน — ดูแค่ appointment_date ในเดือนนี้
      // (ไม่นับ pickup_date เพราะงานที่ค้างอยู่ในร้านนานไม่ควรไปบล็อกคิวรับรถใหม่วันอื่น)
      const res = await fetch(
        `${SUPABASE_URL}/rest/v1/bookings?appointment_date=gte.${firstDay}&appointment_date=lte.${lastDayStr}&select=appointment_date,queue_status`,
        {
          headers: {
            'apikey': SUPABASE_ANON_KEY,
            'Authorization': `Bearer ${SUPABASE_ANON_KEY}`
          }
        }
      );
      const bookings = await res.json();

      // นับจำนวนคิวแต่ละวัน
      bookingData = {};
      bookings
        .filter(b => b.queue_status !== 'ยกเลิก')
        .forEach(b => {
          bookingData[b.appointment_date] = (bookingData[b.appointment_date] || 0) + 1;
        });
    } catch (err) {
      console.error('โหลด bookings ไม่ได้:', err);
      bookingData = {};
    }

    isLoading = false;
    renderCalendar();
  }

  // ===== ตรวจสอบวันหยุด =====
  function isHoliday(dateStr) {
    return holidays.has(dateStr);
  }

  function isTuesday(date) {
    return date.getDay() === 2;
  }

  function toDateStr(date) {
    const y = date.getFullYear();
    const m = String(date.getMonth() + 1).padStart(2, '0');
    const d = String(date.getDate()).padStart(2, '0');
    return `${y}-${m}-${d}`;
  }

  // ===== Render ปฏิทิน =====
  function renderCalendar() {
    const label = document.getElementById('cal-month-label');
    label.textContent = `${THAI_MONTHS[currentMonth]} ${currentYear + 543}`;

    const container = document.getElementById('cal-days');
    container.innerHTML = '';

    const today    = new Date();
    today.setHours(0, 0, 0, 0);
    const todayStr = toDateStr(today);

    const firstDay = new Date(currentYear, currentMonth, 1);
    const lastDay  = new Date(currentYear, currentMonth + 1, 0);
    const startDow = firstDay.getDay();
    const totalDays = lastDay.getDate();

    // Prev month empty cells
    for (let i = 0; i < startDow; i++) {
      const el = document.createElement('div');
      el.className = 'cal-day empty';
      container.appendChild(el);
    }

    // วันในเดือน
    for (let d = 1; d <= totalDays; d++) {
      const date    = new Date(currentYear, currentMonth, d);
      const dateStr = toDateStr(date);
      const isPast  = date < today;
      const isTue   = isTuesday(date);
      const isHol   = isHoliday(dateStr);
      const isToday = dateStr === todayStr;
      const count   = bookingData[dateStr] || 0;
      const remain  = MAX_PER_DAY - count;

      const el = document.createElement('div');
      el.className = 'cal-day';

      // สถานะ
      let statusText = '';
      let statusClass = '';

      if (isPast) {
        el.classList.add('past', 'disabled');
        statusText = '';
      } else if (isTue || isHol || remain <= 0) {
        statusClass = 'status-full';
        el.classList.add('disabled');
        statusText = 'ปิดรับคิว';
      } else if (remain <= 2) {
        statusClass = 'status-low';
        statusText = 'ว่าง ' + remain + ' คิว';
      } else {
        statusClass = 'status-open';
        statusText = 'ว่าง ' + remain + ' คิว';
      }

      if (statusClass) el.classList.add(statusClass);
      if (isToday) el.classList.add('today');

      // คลิกวันที่ว่าง → เด้งไปหน้าจอง
      if (!isPast && !isTue && !isHol && remain > 0) {
        el.classList.add('clickable');
        el.addEventListener('click', function() {
          window.location.href = 'booking.html?date=' + dateStr;
        });
        el.style.cursor = 'pointer';
      }

      // หมายเลขวัน
      const numEl = document.createElement('div');
      numEl.className = 'day-num';
      numEl.textContent = d;
      el.appendChild(numEl);

      // ข้อความสถานะ
      if (statusText) {
        const statusEl = document.createElement('div');
        statusEl.className = 'day-status';
        statusEl.textContent = statusText;
        el.appendChild(statusEl);

        // Dot
        if (!isPast && !isTue && !isHol) {
          const dot = document.createElement('div');
          dot.className = 'day-dot';
          el.appendChild(dot);
        }
      }

      container.appendChild(el);
    }

    // ปิดปุ่มย้อนกลับถ้าเป็นเดือนปัจจุบัน
    const now = new Date();
    document.getElementById('btn-prev').disabled =
      currentYear === now.getFullYear() && currentMonth === now.getMonth();

    // Fade in animation
    container.classList.add('fade-in');
  }

  // ===== เปลี่ยนเดือน with animation =====
  function changeMonth(dir) {
    const container = document.getElementById('cal-days');
    
    // Fade out
    container.classList.remove('fade-in');
    container.classList.add('fade-out');
    
    setTimeout(() => {
      currentMonth += dir;
      if (currentMonth > 11) { currentMonth = 0; currentYear++; }
      if (currentMonth < 0)  { currentMonth = 11; currentYear--; }
      bookingData = {};
      
      container.classList.remove('fade-out');
      container.innerHTML = '<div class="loading"><div class="spinner"></div>กำลังโหลด...</div>';
      loadBookings();
    }, 150);
  }

  // ===== เริ่มต้น =====
  async function init() {
    await loadHolidays();
    loadBookings();
  }
  init();
</script>

</body>
</html>
